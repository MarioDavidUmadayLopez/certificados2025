<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Verificación de Certificados</title>

<style>

body{
font-family: Arial, sans-serif;
background:linear-gradient(135deg,#2b7cff,#00c6ff);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
margin:0;
}

.container{
background:white;
padding:40px;
width:380px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
text-align:center;
}

h2{
margin-top:0;
color:#333;
}

input{
width:85%;
padding:12px;
margin-top:15px;
border-radius:6px;
border:1px solid #ccc;
font-size:16px;
}

button{
margin-top:15px;
padding:12px 25px;
border:none;
background:#2b7cff;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#1a5ed8;
}

#resultado{
margin-top:25px;
font-size:16px;
}

.ok{
color:#28a745;
font-weight:bold;
}

.error{
color:red;
}

.descargar{
display:inline-block;
margin-top:10px;
padding:10px 20px;
background:#28a745;
color:white;
text-decoration:none;
border-radius:6px;
}

.descargar:hover{
background:#1f8a37;
}

</style>

</head>

<body>

<div class="container">

<h2>Verificación de Certificados</h2>

<p>Ingrese su número de CI</p>

<input type="text" id="ci" placeholder="Ej: 7212809">

<br>

<button onclick="buscar()">Buscar</button>

<div id="resultado"></div>

</div>

<script>

const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQBwaV8MukiuNrmX2wh-JUBjmbimI1mgF7adnuMdWxajvQ2-jvvWYi9uKn_EyqZk3kFyYKam8yGq7V_/pub?gid=0&single=true&output=csv";
async function buscar(){

let ci=document.getElementById("ci").value.trim().replace(/\s/g,'');

if(ci===""){
document.getElementById("resultado").innerHTML="<span class='error'>Ingrese su CI</span>";
return;
}

document.getElementById("resultado").innerHTML="Buscando certificado...";

try{

let response=await fetch(url);
let data=await response.text();

let filas=data.split(/\r?\n/);

let encontrado=false;

for(let i=1;i<filas.length;i++){

let columnas=filas[i].split(",");

let ciTabla=columnas[0].replace(/"/g,'').trim();
let link=columnas[1].replace(/"/g,'');

if(ci===ciTabla){

document.getElementById("resultado").innerHTML=
`
<div class="ok">✔ Certificado válido encontrado</div>

<a class="descargar" href="${link}" target="_blank">
Descargar Certificado
</a>
`;

encontrado=true;
break;

}

}

if(!encontrado){

document.getElementById("resultado").innerHTML=
"<span class='error'>No se encontró certificado</span>";

}

}catch(error){

document.getElementById("resultado").innerHTML=
"<span class='error'>Error consultando la base de datos</span>";

}

}

</script>

</body>
</html>
